<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能起名 - 宝宝取名专家</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366F1;
            --primary-light: #8B5CF6;
            --gold: #F59E0B;
            --gold-light: #FCD34D;
            --pink: #EC4899;
            --cyan: #06B6D4;
        }
        
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }
        
        .container { max-width: 480px; margin: 0 auto; min-height: 100vh; }
        
        /* Header */
        .header {
            padding: 50px 30px 30px;
            text-align: center;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.3) 0%, transparent 100%);
            position: relative;
        }
        
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 20px 60px rgba(99, 102, 241, 0.4);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .app-name {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        
        .slogan {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 16px;
            font-size: 12px;
            color: #1a1a2e;
            font-weight: 600;
            margin-top: 12px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            padding: 0 20px;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-color: transparent;
            color: white;
        }
        
        /* Card */
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 28px;
            margin: 0 20px 20px;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Form */
        .form-item { margin-bottom: 20px; }
        
        .label {
            display: block;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        
        input, select {
            width: 100%;
            height: 52px;
            padding: 0 18px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 15px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }
        
        input::placeholder { color: rgba(255,255,255,0.4); }
        
        /* Gender */
        .gender-select { display: flex; gap: 12px; }
        
        .gender-btn {
            flex: 1;
            height: 90px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gender-btn .icon { font-size: 36px; margin-bottom: 6px; }
        
        .gender-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-color: transparent;
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }
        
        /* Button */
        .btn {
            width: 100%;
            height: 58px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 29px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
            transition: all 0.3s;
        }
        
        .btn:active { transform: scale(0.98); }
        
        /* Results */
        .results { display: none; margin: 0 20px 20px; }
        .results.show { display: block; animation: slideUp 0.5s ease; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .results-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .name-card {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 14px;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease backwards;
        }
        
        .name-card:nth-child(1) { animation-delay: 0.1s; }
        .name-card:nth-child(2) { animation-delay: 0.15s; }
        .name-card:nth-child(3) { animation-delay: 0.2s; }
        .name-card:nth-child(4) { animation-delay: 0.25s; }
        .name-card:nth-child(5) { animation-delay: 0.3s; }
        .name-card:nth-child(6) { animation-delay: 0.35s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .name-card:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.12);
        }
        
        .name-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .name-text {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .score-badge {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            padding: 6px 16px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 16px;
        }
        
        .meaning { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
        .source { font-size: 12px; color: rgba(255,255,255,0.5); }
        .source::before { content: '📖 '; }
        
        .wuxing-tag {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-left: 8px;
        }
        
        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
        
        /* Zodiac Section */
        .zodiac-result { display: none; }
        .zodiac-result.show { display: block; }
        
        .zodiac-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 16px;
        }
        
        .zodiac-item {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 10px;
            text-align: center;
        }
        
        .zodiac-icon { font-size: 28px; display: block; margin-bottom: 6px; }
        .zodiac-label { font-size: 12px; color: rgba(255,255,255,0.7); }
        .zodiac-value { font-size: 14px; font-weight: 600; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="header">
            <div class="logo">✨</div>
            <div class="app-name">智能起名</div>
            <div class="slogan">八字五行 · 生肖属相 · 诗词典故</div>
            <div class="badge">🎁 免费智能 · 专业可靠</div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('name')">🔮 智能起名</div>
            <div class="tab" onclick="switchTab('zodiac')">🐯 生肖运势</div>
            <div class="tab" onclick="switchTab('rank')">📊 名字排行</div>
        </div>
        
        <!-- 智能起名 -->
        <div id="tab-name">
            <div class="card">
                <div class="card-title">📝 填写信息</div>
                
                <div class="form-item">
                    <label class="label">姓氏</label>
                    <input type="text" id="surname" placeholder="请输入姓氏" maxlength="1">
                </div>
                
                <div class="form-item">
                    <label class="label">性别</label>
                    <div class="gender-select">
                        <div class="gender-btn" data-gender="boy" onclick="selectGender('boy')">
                            <span class="icon">👦</span>
                            <span>男宝宝</span>
                        </div>
                        <div class="gender-btn" data-gender="girl" onclick="selectGender('girl')">
                            <span class="icon">👧</span>
                            <span>女宝宝</span>
                        </div>
                    </div>
                </div>
                
                <div class="form-item">
                    <label class="label">出生日期</label>
                    <input type="date" id="birthday" style="color-scheme: dark;">
                </div>
                
                <button class="btn" onclick="generateNames()">开始起名</button>
            </div>
        </div>
        
        <!-- 生肖运势 -->
        <div id="tab-zodiac" style="display: none;">
            <div class="card">
                <div class="card-title">🐯 查看生肖运势</div>
                
                <div class="form-item">
                    <label class="label">出生年份</label>
                    <select id="zodiac-year" onchange="showZodiac()">
                        <option value="">请选择年份</option>
                    </select>
                </div>
                
                <div class="zodiac-result" id="zodiac-result">
                    <div class="zodiac-grid">
                        <div class="zodiac-item">
                            <span class="zodiac-icon" id="zodiac-icon">🐭</span>
                            <span class="zodiac-label">属相</span>
                            <span class="zodiac-value" id="zodiac-animal">-</span>
                        </div>
                        <div class="zodiac-item">
                            <span class="zodiac-icon">🎯</span>
                            <span class="zodiac-label">幸运数</span>
                            <span class="zodiac-value" id="zodiac-lucky-num">-</span>
                        </div>
                        <div class="zodiac-item">
                            <span class="zodiac-icon">🌈</span>
                            <span class="zodiac-label">幸运色</span>
                            <span class="zodiac-value" id="zodiac-lucky-color">-</span>
                        </div>
                        <div class="zodiac-item">
                            <span class="zodiac-icon">⭐</span>
                            <span class="zodiac-label">五行</span>
                            <span class="zodiac-value" id="zodiac-wuxing">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 名字排行 -->
        <div id="tab-rank" style="display: none;">
            <div class="card">
                <div class="card-title">📊 热门名字排行</div>
                <div class="form-item">
                    <label class="label">性别</label>
                    <div class="gender-select">
                        <div class="gender-btn" data-gender="boy-rank" onclick="selectGenderRank('boy')">
                            <span class="icon">👦</span>
                            <span>男孩</span>
                        </div>
                        <div class="gender-btn" data-gender="girl-rank" onclick="selectGenderRank('girl')">
                            <span class="icon">👧</span>
                            <span>女孩</span>
                        </div>
                    </div>
                </div>
                <div id="rank-list"></div>
            </div>
        </div>
        
        <!-- 结果 -->
        <div class="results" id="results">
            <div class="results-title">✨ 为您推荐的名字</div>
            <div id="namesList"></div>
        </div>
        
        <div class="footer">
            <p>© 2026 智能起名 · 让名字更有意义</p>
        </div>
    </div>
    
    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsContainer.appendChild(star);
        }
        
        // Initialize year dropdown
        const yearSelect = document.getElementById('zodiac-year');
        for (let y = 2024; y >= 1950; y--) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y + '年';
            yearSelect.appendChild(opt);
        }
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('tab-name').style.display = tab === 'name' ? 'block' : 'none';
            document.getElementById('tab-zodiac').style.display = tab === 'zodiac' ? 'block' : 'none';
            document.getElementById('tab-rank').style.display = tab === 'rank' ? 'block' : 'none';
            document.getElementById('results').classList.remove('show');
        }
        
        let selectedGender = '';
        
        function selectGender(gender) {
            selectedGender = gender;
            document.querySelectorAll('.gender-btn[data-gender]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.gender === gender);
            });
        }
        
        let selectedGenderRank = '';
        
        function selectGenderRank(gender) {
            selectedGenderRank = gender;
            document.querySelectorAll('.gender-btn[data-gender-rank]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.genderRank === gender);
            });
            showRankList(gender);
        }
        
        // Zodiac data
        const zodiacData = {
            '鼠': { icon: '🐭', wuxing: '水', luckyNum: '2,3', luckyColor: '蓝、金、绿' },
            '牛': { icon: '🐮', wuxing: '土', luckyNum: '1,9', luckyColor: '黄、绿' },
            '虎': { icon: '🐯', wuxing: '木', luckyNum: '1,3,4', luckyColor: '蓝、灰、橙' },
            '兔': { icon: '🐰', wuxing: '木', luckyNum: '3,4,9', luckyColor: '红、粉、紫、蓝' },
            '龙': { icon: '🐲', wuxing: '土', luckyNum: '1,6,7', luckyColor: '金、银、白' },
            '蛇': { icon: '🐍', wuxing: '火', luckyNum: '2,8,9', luckyColor: '黑、红、黄' },
            '马': { icon: '🐴', wuxing: '火', luckyNum: '2,3,7', luckyColor: '黄、绿' },
            '羊': { icon: '🐏', wuxing: '土', luckyNum: '3,9', luckyColor: '绿、红、紫' },
            '猴': { icon: '🐒', wuxing: '金', luckyNum: '1,7,8', luckyColor: '白、蓝、金' },
            '鸡': { icon: '🐔', wuxing: '金', luckyNum: '5,7,8', luckyColor: '金、绿、蓝' },
            '狗': { icon: '🐕', wuxing: '土', luckyNum: '3,4,9', luckyColor: '红、绿、紫' },
            '猪': { icon: '🐖', wuxing: '水', luckyNum: '2,5,8', luckyColor: '黄、灰、棕、金' }
        };
        
        function showZodiac() {
            const year = parseInt(document.getElementById('zodiac-year').value);
            if (!year) return;
            
            const zodiacs = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            const index = (year - 4) % 12;
            const animal = zodiacs[index];
            const data = zodiacData[animal];
            
            document.getElementById('zodiac-icon').textContent = data.icon;
            document.getElementById('zodiac-animal').textContent = animal + '年';
            document.getElementById('zodiac-lucky-num').textContent = data.luckyNum;
            document.getElementById('zodiac-lucky-color').textContent = data.luckyColor;
            document.getElementById('zodiac-wuxing').textContent = data.wuxing;
            
            document.getElementById('zodiac-result').classList.add('show');
        }
        
        // Names database
        const nameDatabase = {
            boy: [
                { name: '浩然', score: 98, meaning: '正气广大，胸怀宽广', source: '《孟子》', wuxing: '水' },
                { name: '明轩', score: 96, meaning: '聪明睿智，气宇轩昂', source: '成语', wuxing: '土' },
                { name: '思远', score: 95, meaning: '思虑深远，志存高远', source: '《诗经》', wuxing: '木' },
                { name: '一诺', score: 97, meaning: '一言九鼎，诚实守信', source: '成语', wuxing: '火' },
                { name: '宇航', score: 94, meaning: '遨游宇宙，探索未知', source: '现代', wuxing: '土' },
                { name: '瑾瑜', score: 96, meaning: '美玉无瑕，光彩照人', source: '《诗经》', wuxing: '木' },
                { name: '梓涵', score: 93, meaning: '生机勃勃，涵养深厚', source: '诗词', wuxing: '木' },
                { name: '子墨', score: 92, meaning: '文房四宝，诗书传家', source: '诗词', wuxing: '土' },
            ],
            girl: [
                { name: '诗涵', score: 97, meaning: '诗情画意，含苞待放', source: '《诗经》', wuxing: '水' },
                { name: '雨晴', score: 96, meaning: '雨过天晴，清新美好', source: '诗词', wuxing: '火' },
                { name: '欣怡', score: 95, meaning: '欣喜愉悦，心旷神怡', source: '诗词', wuxing: '土' },
                { name: '梓萱', score: 94, meaning: '生机勃勃，美丽坚强', source: '诗词', wuxing: '木' },
                { name: '雅楠', score: 95, meaning: '高雅大方，坚韧不拔', source: '成语', wuxing: '木' },
                { name: '可欣', score: 96, meaning: '温柔可爱，欣喜美好', source: '诗词', wuxing: '木' },
                { name: '思琪', score: 93, meaning: '思念深厚，美好如花', source: '诗词', wuxing: '金' },
                { name: '梦琪', score: 94, meaning: '梦回唐朝，美玉无瑕', source: '诗词', wuxing: '木' },
            ]
        };
        
        // Rank list
        const rankList = {
            boy: ['浩然', '一诺', '明轩', '宇航', '瑾瑜', '思远', '梓涵', '子墨', '瑞霖', '锦程'],
            girl: ['诗涵', '可欣', '雨晴', '欣怡', '梓萱', '雅楠', '梦琪', '思琪', '欣悦', '雪晴']
        };
        
        function showRankList(gender) {
            const list = rankList[gender] || [];
            const html = list.map((name, i) => `
                <div class="name-card">
                    <div class="name-main">
                        <span class="name-text">${i + 1}. ${name}</span>
                        <span class="score-badge" style="background: linear-gradient(135deg, ${i < 3 ? '#F59E0B' : '#6366F1'}, ${i < 3 ? '#FCD34D' : '#8B5CF6'})">${98 - i * 2}分</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('rankList') ? document.getElementById('rankList').innerHTML = html : document.getElementById('rank-list').innerHTML = html;
        }
        
        function generateNames() {
            const surname = document.getElementById('surname').value.trim();
            const birthday = document.getElementById('birthday').value;
            
            if (!surname) { alert('请输入姓氏'); return; }
            if (!selectedGender) { alert('请选择性别'); return; }
            if (!birthday) { alert('请选择出生日期'); return; }
            
            const names = nameDatabase[selectedGender] || [];
            const shuffled = [...names].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 6);
            
            const listHtml = selected.map(n => `
                <div class="name-card">
                    <div class="name-main">
                        <span class="name-text">${surname}${n.name}<span class="wuxing-tag">${n.wuxing}</span></span>
                        <span class="score-badge">${n.score}分</span>
                    </div>
                    <div class="meaning">💫 ${n.meaning}</div>
                    <div class="source">${n.source}</div>
                </div>
            `).join('');
            
            document.getElementById('namesList').innerHTML = listHtml;
            document.getElementById('results').classList.add('show');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
